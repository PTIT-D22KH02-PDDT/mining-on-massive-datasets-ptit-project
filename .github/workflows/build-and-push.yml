name: Build & Push Docker Images

on:
  push:
    branches: [main, "**feat**"]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - dockerfile: Dockerfile.api
            image: otto-api
          - dockerfile: Dockerfile.streaming
            image: otto-spark-streaming
          - dockerfile: Dockerfile.dashboard
            image: otto-dashboard
          - dockerfile: Dockerfile.setup
            image: otto-setup
          - dockerfile: Dockerfile.spark-worker
            image: otto-spark-worker
          - dockerfile: Dockerfile.frontend
            image: otto-frontend
            target: production

    steps:
      - uses: actions/checkout@v4

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_USERNAME }}/${{ matrix.image }}
          tags: |
            type=ref,event=branch,enable=${{ contains(github.ref, 'feat') }}
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=feat-latest,enable=${{ contains(github.ref, 'feat') }}

      - name: Login to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          dockerfile: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
