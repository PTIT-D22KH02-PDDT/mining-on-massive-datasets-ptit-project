services:
  kafka:
    image: docker.io/apache/kafka:4.1.1
    container_name: kafka
    ports:
      - "29092:29092"
    volumes:
      - ./kafka_data:/var/lib/kafka/data
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://${KAFKA_HOST_EXTERNAL:-localhost}:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
      - KAFKA_OPTS=-Djava.net.preferIPv4Stack=true
    networks:
      - spark-net
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s


  kafka-ui:
    image: provectuslabs/kafka-ui
    ports:
      - "8989:8080"
    depends_on:
      - kafka
    restart: always
    environment:
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    networks:
      - spark-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru
    networks:
      - spark-net
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1.5g

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=otto_recommender
      - POSTGRES_USER=otto
      - POSTGRES_PASSWORD=otto123
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - spark-net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2g

  # --- Application Services ---
  
  api:
    build: .
    image: ${DOCKER_USERNAME:-YOUR_USERNAME}/otto-api:${DOCKER_TAG:-latest}
    container_name: otto-api
    command: python3 src/api/main.py
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
      redis:
        condition: service_started
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SASREC_REMOTE_URL=${SASREC_REMOTE_URL:-https://rs-model1.vucongtuanduong.dpdns.org/}
    networks:
      - spark-net
      
  dashboard:
    build: .
    image: ${DOCKER_USERNAME:-YOUR_USERNAME}/otto-dashboard:${DOCKER_TAG:-latest}
    container_name: otto-dashboard
    command: streamlit run streamlit_app.py
    ports:
      - "8501:8501"
    depends_on:
      - api
    environment:
      - API_URL=http://api:8000
    networks:
      - spark-net

  spark-streaming:
    build: .
    image: ${DOCKER_USERNAME:-YOUR_USERNAME}/otto-spark-streaming:${DOCKER_TAG:-latest}
    container_name: otto-spark-streaming
    command: python3 src/streaming/spark_streaming_job.py
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
    environment:
      - POSTGRES_HOST=postgres
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    volumes:
      - ./spark-checkpoints:/tmp/spark-checkpoints
      - ./datasets:/opt/app/datasets
    networks:
      - spark-net

  setup-jobs:
    build: .
    image: ${DOCKER_USERNAME:-YOUR_USERNAME}/otto-setup:${DOCKER_TAG:-latest}
    container_name: otto-setup
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_started
    environment:
      - POSTGRES_HOST=postgres
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    command: >
      bash -c "
      echo 'Waiting for services to be ready...' &&
      sleep 10 &&
      echo 'Creating Kafka Topic...' &&
      python3 src/scripts/create_kafka_topic.py &&
      echo 'Running Initial Batch Analysis...' &&
      python3 src/batch/funnel_analysis.py &&
      python3 src/batch/seed_popular_items.py &&
      echo 'Setup Complete!'
      "
    volumes:
      - ./datasets:/opt/app/datasets
    networks:
      - spark-net

networks:
  spark-net:
    driver: bridge

volumes:
  pgdata:
