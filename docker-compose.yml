services:

  # =============================
  # MinIO - Object Storage
  # =============================
  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Web Console
    volumes:
      - minio_data:/data
    networks:
      - spark-net

  # ngrok:
  #   image: wernight/ngrok:latest
  #   container_name: ngrok
  #   depends_on:
  #     - minio
  #   networks:
  #     - spark-net
  #   ports:
  #     - "4040:4040"
  #   environment:
  #     - NGROK_AUTH=3AN2sGO1WbTLunqfdBBjLqgmo5m_2pVyBQAoNHoaVaC6adk1Y
  #     - NGROK_PROTOCOL=HTTP
  #     - NGROK_PORT=minio:9000
  ngrok:
    image: ngrok/ngrok:latest # Dùng bản mới nhất để tránh lỗi version cũ
    container_name: ngrok
    # restart: always
    depends_on:
      - minio
    networks:
      - spark-net
    ports:
      - "4040:4040"
    environment:
      - NGROK_AUTHTOKEN=3AN2sGO1WbTLunqfdBBjLqgmo5m_2pVyBQAoNHoaVaC6adk1Y
    command:
      - "http"
      - "minio:9000"

  # =============================
  # Spark Master
  # =============================
  spark-master:
    image: spark:4.0.1-java21-python3
    container_name: spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "7077:7077"
      - "8080:8080"
    networks:
      - spark-net
    mem_limit: 2g
    cpus: 1.0

  # =============================
  # Spark Worker
  # =============================
  spark-worker:
    image: spark:4.0.1-java21-python3
    container_name: spark-worker
    depends_on:
      - spark-master
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    networks:
      - spark-net
    mem_limit: 4g
    cpus: 2.0

  # =============================
  # Spark Client (submit job)
  # =============================

  spark-client:
    image: spark:4.0.1-java21-python3
    container_name: spark-client
    depends_on:
      - spark-master
    env_file:
      - .env
    networks:
      - spark-net
    tty: true
    stdin_open: true
    command: tail -f /dev/null

volumes:
  minio_data:


networks:
  spark-net:
    driver: bridge
