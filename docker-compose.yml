services:
  kafka:
    image: docker.io/apache/kafka:4.1.1
    container_name: kafka
    ports:
      - "29092:29092"
    volumes:
      - ./kafka_data:/var/lib/kafka/data
    environment:
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://${KAFKA_HOST_EXTERNAL:-localhost}:29092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
      - KAFKA_LOG_DIRS=/var/lib/kafka/data
      - KAFKA_HEAP_OPTS=-Xms2G -Xmx2G
      - KAFKA_OPTS=-XX:+UseG1GC -XX:MaxGCPauseMillis=100 -Djava.net.preferIPv4Stack=true
      - KAFKA_NUM_IO_THREADS=8
      - KAFKA_NUM_NETWORK_THREADS=6
      - KAFKA_NUM_REPLICA_FETCHERS=2
      - KAFKA_LOG_RETENTION_HOURS=2
      - KAFKA_LOG_RETENTION_BYTES=-1
      - KAFKA_LOG_SEGMENT_DELETE_DELAY_MS=10000
      - KAFKA_LOG_FLUSH_INTERVAL_MESSAGES=10000
      - KAFKA_LOG_FLUSH_INTERVAL_MS=1000
      - KAFKA_LOG_SEGMENT_BYTES=536870912
    networks:
      - spark-net
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-broker-api-versions.sh", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 4g

  kafka-ui:
    image: provectuslabs/kafka-ui
    ports:
      - "8989:8080"
    depends_on:
      kafka:
        condition: service_healthy
    restart: always
    environment:
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    networks:
      - spark-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru
    networks:
      - spark-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1.5g

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-otto_recommender}
      - POSTGRES_USER=${POSTGRES_USER:-otto}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-otto123}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init/01_create_tables.sql:/docker-entrypoint-initdb.d/01_create_tables.sql
      - ./postgres-init/02_cleanup_old_data.sql:/docker-entrypoint-initdb.d/02_cleanup_old_data.sql
    networks:
      - spark-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-otto} -d ${POSTGRES_DB:-otto_recommender}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2g

  # === Spark Cluster ===

  spark-master:
    image: apache/spark:3.5.0
    container_name: spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    ports:
      - "7077:7077"
      - "8080:8080"
    environment:
      - PYSPARK_PYTHON=python3
      - PYSPARK_DRIVER_PYTHON=python3
    volumes:
      - ./datasets:/opt/app/datasets:ro
      - ./spark-checkpoints:/tmp/spark-checkpoints
    networks:
      - spark-net

  spark-worker-1:
    build:
      context: .
      dockerfile: Dockerfile.spark-worker
    image: ${DOCKER_USERNAME:-otto}/otto-spark-worker:${DOCKER_TAG:-latest}
    container_name: spark-worker-1
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "--memory", "4G", "--cores", "2", "spark://spark-master:7077"]
    depends_on:
      - spark-master
    environment:
      - PYSPARK_PYTHON=/usr/bin/python3
    volumes:
      - ./datasets:/opt/app/datasets:ro
      - ./spark-checkpoints:/tmp/spark-checkpoints
    networks:
      - spark-net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4g

  spark-worker-2:
    build:
      context: .
      dockerfile: Dockerfile.spark-worker
    image: ${DOCKER_USERNAME:-otto}/otto-spark-worker:${DOCKER_TAG:-latest}
    container_name: spark-worker-2
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "--memory", "4G", "--cores", "2", "spark://spark-master:7077"]
    depends_on:
      - spark-master
    environment:
      - PYSPARK_PYTHON=/usr/bin/python3
    volumes:
      - ./datasets:/opt/app/datasets:ro
      - ./spark-checkpoints:/tmp/spark-checkpoints
    networks:
      - spark-net
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4g

  # === One-time Setup ===

  setup-jobs:
    image: ${DOCKER_USERNAME:-otto}/otto-setup:${DOCKER_TAG:-latest}
    container_name: otto-setup-jobs
    command: >
      bash -c "
      echo 'Creating Kafka topics...' &&
      python3 src/scripts/create_kafka_topic.py &&
      echo 'Running funnel analysis...' &&
      python3 src/batch/funnel_analysis.py &&
      echo 'Seeding popular items...' &&
      python3 src/batch/seed_popular_items.py &&
      echo 'Setup complete!'
      "
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER:-otto}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-otto123}
      - POSTGRES_DB=${POSTGRES_DB:-otto_recommender}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - PYSPARK_PYTHON=/usr/bin/python3
      - SPARK_MASTER_URL=${SPARK_MASTER_URL:-spark://spark-master:7077}
      - SPARK_DRIVER_MEMORY=${SPARK_DRIVER_MEMORY:-2g}
      - SPARK_EXECUTOR_MEMORY=${SPARK_EXECUTOR_MEMORY:-3g}
    networks:
      - spark-net
    volumes:
      - ./datasets:/opt/app/datasets
    restart: "no"
    profiles:
      - setup

  setup-matrix:
    image: ${DOCKER_USERNAME:-otto}/otto-setup:${DOCKER_TAG:-latest}
    container_name: otto-setup-matrix
    command: python3 -m src.trainer.preprocess.build_covisited_matrix --load-redis
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - SPARK_MASTER_URL=local[*]
      - SPARK_DRIVER_MEMORY=2g
      - SPARK_EXECUTOR_MEMORY=3g
    volumes:
      - ./datasets:/opt/app/datasets
    networks:
      - spark-net
    restart: "no"
    profiles:
      - setup

  # === Application Services ===

  api:
    image: ${DOCKER_USERNAME:-otto}/otto-api:${DOCKER_TAG:-latest}
    container_name: otto-api
    command: python3 src/api/main.py
    ports:
      - "8000:8000"
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-otto_recommender}
      - POSTGRES_USER=${POSTGRES_USER:-otto}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-otto123}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SASREC_REMOTE_URL=${SASREC_REMOTE_URL:-https://rs-model1.vucongtuanduong.dpdns.org/}
    networks:
      - spark-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request, sys; r=urllib.request.urlopen('http://localhost:8000/api/health'); sys.exit(0 if r.status==200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2g
        reservations:
          cpus: '0.5'
          memory: 512m

  dashboard:
    image: ${DOCKER_USERNAME:-otto}/otto-dashboard:${DOCKER_TAG:-latest}
    container_name: otto-dashboard
    command: streamlit run streamlit_app.py
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - API_URL=http://api:8000
    networks:
      - spark-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import socket; s=socket.socket(); s.settimeout(5); s.connect(('localhost',8501)); s.close()\""]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1g
        reservations:
          cpus: '0.25'
          memory: 256m

  spark-streaming:
    image: ${DOCKER_USERNAME:-otto}/otto-spark-streaming:${DOCKER_TAG:-latest}
    container_name: otto-spark-streaming
    command: python3 src/streaming/spark_streaming_job.py
    depends_on:
      kafka:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-otto_recommender}
      - POSTGRES_USER=${POSTGRES_USER:-otto}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-otto123}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPARK_MASTER_URL=${SPARK_MASTER_URL:-spark://spark-master:7077}
      - SPARK_DRIVER_MEMORY=${SPARK_DRIVER_MEMORY:-2g}
      - SPARK_EXECUTOR_MEMORY=${SPARK_EXECUTOR_MEMORY:-3g}
      - SPARK_MAX_OFFSETS_PER_TRIGGER=${SPARK_MAX_OFFSETS_PER_TRIGGER:-10000}
      - PYSPARK_PYTHON=/usr/bin/python3
      - PYSPARK_DRIVER_PYTHON=/usr/bin/python3
    volumes:
      - ./spark-checkpoints:/tmp/spark-checkpoints
      - ./datasets:/opt/app/datasets
    networks:
      - spark-net
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8g
        reservations:
          cpus: '1.0'
          memory: 2g

  # === Data Retention Cleanup (Phase 6.1) ===
  cleanup:
    image: postgres:16-alpine
    container_name: otto-cleanup
    command: >
      bash -c "
        apk add --no-cache postgresql-client bash &&
        while true; do
          PGPASSWORD=$$POSTGRES_PASSWORD psql -h $$POSTGRES_HOST -p $$POSTGRES_PORT -U $$POSTGRES_USER -d $$POSTGRES_DB -f /cleanup/02_cleanup_old_data.sql >> /var/log/cleanup.log 2>&1 &&
          echo 'Cleanup done, next run in 24h' >> /var/log/cleanup.log &&
          sleep 86400
        done
      "
    depends_on:
      postgres:
        condition: service_started
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-otto_recommender}
      - POSTGRES_USER=${POSTGRES_USER:-otto}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-otto123}
    volumes:
      - ./postgres-init:/cleanup
    networks:
      - spark-net
    restart: unless-stopped
    profiles:
      - cleanup

networks:
  spark-net:
    driver: bridge

volumes:
  pgdata: