version: '3.8'

services:
  # 1. Infrastructure Services
  postgres:
    image: postgres:16-alpine
    container_name: otto-postgres
    environment:
      - POSTGRES_DB=otto_recommender
      - POSTGRES_USER=otto
      - POSTGRES_PASSWORD=otto123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - spark-net

  redis:
    image: redis:7-alpine
    container_name: otto-redis
    ports:
      - "6379:6379"
    networks:
      - spark-net

  kafka:
    image: apache/kafka:latest
    container_name: otto-kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    networks:
      - spark-net

  # 2. Application Services (PULLED FROM DOCKER HUB)
  api:
    image: ${DOCKER_USERNAME}/otto-api:${DOCKER_TAG:-latest}
    container_name: otto-api
    command: python3 src/api/main.py
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SASREC_REMOTE_URL=${SASREC_REMOTE_URL}
    volumes:
      - ./datasets:/opt/app/datasets
    depends_on:
      - postgres
      - redis
      - kafka
    networks:
      - spark-net

  dashboard:
    image: ${DOCKER_USERNAME}/otto-dashboard:${DOCKER_TAG:-latest}
    container_name: otto-dashboard
    command: streamlit run streamlit_app.py
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    networks:
      - spark-net

  spark-streaming:
    image: ${DOCKER_USERNAME}/otto-spark-streaming:${DOCKER_TAG:-latest}
    container_name: otto-spark-streaming
    command: python3 src/streaming/spark_streaming_job.py
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - POSTGRES_HOST=postgres
    volumes:
      - ./datasets:/opt/app/datasets
      - ./spark-checkpoints:/tmp/spark-checkpoints
    depends_on:
      - kafka
      - postgres
    networks:
      - spark-net

  setup-jobs:
    image: ${DOCKER_USERNAME}/otto-setup:${DOCKER_TAG:-latest}
    container_name: otto-setup
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - POSTGRES_HOST=postgres
    volumes:
      - ./datasets:/opt/app/datasets
    depends_on:
      - kafka
      - postgres
    networks:
      - spark-net

networks:
  spark-net:
    driver: bridge

volumes:
  pgdata:
  spark-checkpoints:
